[package]
name = "warpdrive-shared"
description = "Shared libraries for WarpDrive Stellar contracts"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
soroban-sdk = { workspace = true }

[features]
testutils = ["dep:k256", "dep:sha3", "dep:ed25519-dalek", "dep:sha2"]

[dependencies.k256]
version = "0.13.4"
features = ["ecdsa"]
optional = true

[dependencies.sha3]
version = "0.10.8"
optional = true

[dependencies.ed25519-dalek]
version = "2"
optional = true

[dependencies.sha2]
version = "0.10"
optional = true
