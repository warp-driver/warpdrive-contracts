[package]
name = "warpdrive-deployer"
description = "Native deployer CLI for the WarpDrive Stellar contracts"
version = "0.2.7"
edition = "2024"
rust-version = "1.90.0"
license = "GPL-3.0-or-later"
authors = ["WarpDrive"]
repository = "https://github.com/warp-driver/warpdrive-contracts"

[[bin]]
name = "warpdrive-deployer"
path = "src/main.rs"

[dependencies]
warpdrive-client = { path = "../client", features = ["manifest"] }
wasi-soroban-rs = "0.2.8"
ed25519-dalek = "2.2.0"
stellar-strkey = "0.0.16"
tokio = { version = "1.52", features = ["macros", "rt-multi-thread"] }
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
hex = "0.4"
rand = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

[dev-dependencies]
warpdrive-shared = { path = "../shared", features = ["testutils"] }
tempfile = "3"
