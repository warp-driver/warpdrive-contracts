[package]
name = "warpdrive-client"
description = "Soroban-rs clients for WarpDrive Stellar contracts"
edition = "2024"
version = "0.2.7"
license = "GPL-3.0-or-later"
authors = ["WarpDrive"]
repository = "https://github.com/warp-driver/warpdrive-contracts"
rust-version = "1.90.0"

[lib]
crate-type = ["rlib"]

[dependencies]
ed25519-dalek = "2.2.0"
wasi-soroban-rs = "0.2.7"
wasi-soroban-rs-macros = "0.2.7"
stellar-strkey = "0.0.16"
tokio = { version = "1.52", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }

[features]
# Off by default so the lean wasm32-wasip2 build never pulls serde in. The
# deployer (and anything that reads/writes a deploy.json manifest) turns it on.
manifest = ["dep:serde", "dep:serde_json", "stellar-strkey/serde"]

[dev-dependencies]
soroban-sdk = "26.0"
warpdrive-shared = { path = "../shared", features = ["testutils"] }
tempfile = "3"
