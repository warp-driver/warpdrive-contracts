version: "3"

includes:
  testnet: ./taskfiles/testnet.yml

vars:
  WASM_TARGET: wasm32v1-none
  WASM_DIR: target/{{.WASM_TARGET}}/release
  CONTRACTS:
    - project-root
    - secp256k1-security
    - secp256k1-verification
    - ed25519-security
    - ed25519-verification
    - ethereum-handler
    - stellar-handler

tasks:
  default:
    cmds:
      - task: build

  setup:
    desc: Install stellar-cli and add WASM target
    cmds:
      - cargo install stellar-cli --locked
      - rustup target add {{.WASM_TARGET}}

  build:
    desc: Build all contracts to WASM
    cmds:
      - cargo build --target {{.WASM_TARGET}} --release

  optimize:
    desc: Build contracts for deployment and optimize (uses stellar CLI for proper stripping)
    cmds:
      - stellar contract build --optimize

  test:
    desc: Run unit tests
    deps: [build]
    cmds:
      - cargo test --lib

  doc-test:
    desc: Run documentation tests
    deps: [build]
    cmds:
      - cargo test --doc

  fmt:
    desc: Format all code
    cmds:
      - cargo fmt --all

  fmt-check:
    desc: Check formatting (CI)
    cmds:
      - cargo fmt --all --check

  clippy:
    desc: Lint all code
    deps: [build]
    cmds:
      - cargo clippy --all-targets -- -D warnings

  lint:
    desc: Format + lint
    cmds:
      - task: fmt
      - task: clippy

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  check:
    desc: Quick cargo check (no WASM build)
    cmds:
      - cargo check --all-targets

  publish:
    desc: Publish warpdrive-shared to crates.io
    dir: '{{.ROOT_DIR}}/packages/shared'
    cmds:
      - cargo publish