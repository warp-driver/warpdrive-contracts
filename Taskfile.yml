version: "3"

includes:
  testnet: ./taskfiles/testnet.yml
  ipfs: ./taskfiles/ipfs.yml

vars:
  WASM_TARGET: wasm32v1-none
  WASM_DIR: target/{{.WASM_TARGET}}/release
  CONTRACTS:
    - project-root
    - secp256k1-security
    - secp256k1-verification
    - ed25519-security
    - ed25519-verification
    - ethereum-handler
    - stellar-handler

tasks:
  default:
    cmds:
      - task: build

  setup:
    desc: Install stellar-cli and add WASM target
    cmds:
      - cargo install stellar-cli --locked
      - rustup target add {{.WASM_TARGET}}

  build:
    desc: Build all contracts to WASM
    cmds:
      - cargo build --target {{.WASM_TARGET}} --release
      - cd packages/client && cargo build

  optimize:
    desc: Build contracts for deployment and optimize (uses stellar CLI for proper stripping)
    cmds:
      - stellar contract build --optimize

  test:
    desc: Run unit tests
    deps: [build]
    cmds:
      - cargo test --lib

  doc-test:
    desc: Run documentation tests
    deps: [build]
    cmds:
      - cargo test --doc

  fmt:
    desc: Format all code
    cmds:
      - cargo fmt --all

  fmt-check:
    desc: Check formatting (CI)
    cmds:
      - cargo fmt --all --check

  clippy:
    desc: Lint all code
    deps: [build]
    cmds:
      - cargo clippy --all-targets -- -D warnings

  lint:
    desc: Format + lint
    cmds:
      - task: fmt
      - task: clippy

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  check:
    desc: Quick cargo check (no WASM build)
    cmds:
      - cargo check --all-targets

  publish:
    desc: Publish to crates.io
    deps: [publish-shared, publish-client]

  publish-shared:
    desc: Publish warpdrive-shared to crates.io
    dir: '{{.ROOT_DIR}}/packages/shared'
    cmds:
      - cargo publish

  publish-client:
    desc: Publish warpdrive-client to crates.io
    dir: '{{.ROOT_DIR}}/packages/client'
    cmds:
      - cargo publish

  docker-middleware-build:
    desc: Build the middleware Docker image as warpdrive-stellar-middleware:dev
    cmds:
      - docker build -t warpdrive-stellar-middleware:dev -f docker/middleware/Dockerfile .

  docker-middleware-testnet:
    desc: Build the middleware image (:dev) and run a testnet deploy smoke test against soroban-testnet
    deps: [docker-middleware-build]
    cmds:
      # Start from clean manifests so the assertions describe what *these* runs
      # deployed, not stale state from a prior --variant=both invocation.
      # The friendbot identity in out/.keys is preserved across runs.
      - rm -f out/deploy.json out/deploy-stellar.json
      # Default (no flag) — ethereum/secp256k1 pipeline + project-root only.
      - IMAGE=warpdrive-stellar-middleware:dev ./docker/middleware/smoke.sh deploy --output-path /out/deploy.json
      # --variant stellar — ed25519 pipeline + project-root only.
      - IMAGE=warpdrive-stellar-middleware:dev ./docker/middleware/smoke.sh deploy --variant stellar --output-path /out/deploy-stellar.json
      # smoke.sh runs the container as root, so manifests land root-owned. Chown them back so host tools can read them.
      - docker run --rm -v "$PWD/out:/out" warpdrive-stellar-middleware:dev chown -R "$(id -u):$(id -g)" /out
      - jq -e '.contracts | has("project_root") and has("ethereum_handler") and (has("stellar_handler") | not) and (has("ed25519_security") | not)' out/deploy.json >/dev/null
      - jq -e '.contracts | has("project_root") and has("stellar_handler") and (has("ethereum_handler") | not) and (has("secp256k1_security") | not)' out/deploy-stellar.json >/dev/null
      - echo "Testnet deploy smoke succeeded — default ethereum manifest at out/deploy.json, stellar variant at out/deploy-stellar.json"