name: Middleware image

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc*"
  pull_request:
    paths:
      - "docker/middleware/**"
      - ".github/workflows/middleware-image.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/warpdrive-stellar-middleware

jobs:
  build_amd64:
    name: Build and Push AMD64 Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=true
            suffix=-amd64
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/middleware/Dockerfile
          # push: ${{ github.event_name != 'pull_request' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false

  build_arm64:
    name: Build and Push ARM64 Image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=true
            suffix=-arm64
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/middleware/Dockerfile
          # push: ${{ github.event_name != 'pull_request' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64
          provenance: false

  create_manifest:
    name: Create and Push Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build_amd64, build_arm64]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # - name: Set IMAGE_TAG
      #   shell: bash
      #   run: |
      #     if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
      #       TAG="${GITHUB_REF_NAME#v}"
      #       IMAGE_TAG="${TAG//[^a-zA-Z0-9_.-]/-}"
      #     elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
      #       IMAGE_TAG="latest"
      #     else
      #       IMAGE_TAG="${GITHUB_REF_NAME//\//-}"
      #     fi
      #     echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV


      - name: Create and push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          GIT_HASH=$(git rev-parse --short "$GITHUB_SHA")

          TAG_ARGS=()
          SOURCE_TAG=""
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            TAG_ARGS+=(--tag "$TAG")
            if [ -z "$SOURCE_TAG" ]; then
              SOURCE_TAG="$TAG"
            fi
          done <<< "$TAGS"

          if [ -z "$SOURCE_TAG" ]; then
            echo "No tags produced by metadata-action; nothing to assemble." >&2
            exit 1
          fi

          TAG_ARGS+=(--tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$GIT_HASH")

          docker buildx imagetools create \
            "${TAG_ARGS[@]}" \
            "${SOURCE_TAG}-amd64" \
            "${SOURCE_TAG}-arm64"
