name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc*"

env:
  RUST_VERSION: "1.94.0"
  STELLAR_CLI_VERSION: "26.0.0"

jobs:
  release:
    name: Build & publish release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32v1-none
      - name: Install Task
        uses: arduino/setup-task@v2
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install Stellar CLI (prebuilt)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-3
          curl -fsSL -o /tmp/stellar-cli.tar.gz \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          sudo tar -xzf /tmp/stellar-cli.tar.gz -C /usr/local/bin stellar
          stellar --version
      - name: Build & optimize contracts
        run: task optimize
      - name: Generate checksums
        run: |
          cd target/wasm32v1-none/release/
          sha256sum warpdrive_*.wasm > checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: >-
          gh release create ${{ github.ref_name }}
          target/wasm32v1-none/release/warpdrive_*.wasm
          target/wasm32v1-none/release/checksums.txt
          --generate-notes
          --title "${{ github.ref_name }}"
