name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc*"

env:
  RUST_VERSION: "1.90.0"

jobs:
  release:
    name: Build & publish release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - name: Install Task
        uses: arduino/setup-task@v2
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked
      - name: Build & optimize contracts
        run: task optimize
      - name: Generate checksums
        run: |
          cd target/wasm32-unknown-unknown/release/
          sha256sum warpdrive_*.optimized.wasm > checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: >-
          gh release create ${{ github.ref_name }}
          target/wasm32-unknown-unknown/release/warpdrive_*.optimized.wasm
          target/wasm32-unknown-unknown/release/checksums.txt
          --generate-notes
          --title "${{ github.ref_name }}"
